<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GymLogger Workout Detail</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <h1>GymLogger</h1>
  <h2>Workout Detail</h2>

  <div class="link-row">
    <a href="/workouts.html">← Back to workouts</a>
    <button id="logout-button" type="button">Logout</button>
  </div>

  <div id="message"></div>

  <section>
    <h2>Workout Info</h2>
    <div id="workout-detail"></div>
  </section>

  <section>
    <h2>Add Exercise</h2>
    <form id="create-exercise-form">
      <label for="exercise_name">Exercise Name</label>
      <input id="exercise_name" name="exercise_name" type="text" required />

      <label for="sets">Sets</label>
      <input id="sets" name="sets" type="number" min="1" required />

      <label for="reps">Reps</label>
      <input id="reps" name="reps" type="number" min="1" required />

      <label for="weight">Weight</label>
      <input id="weight" name="weight" type="number" min="0" step="0.5" required />

      <label for="exercise_notes">Notes</label>
      <textarea id="exercise_notes" name="exercise_notes" rows="3"></textarea>

      <button type="submit">Add Exercise</button>
    </form>
  </section>

  <section>
    <h2>Exercise List</h2>
    <ul id="exercise-list"></ul>
  </section>

  <script src="./js/api.js"></script>
  <script src="./js/workout-detail.js"></script>
</body>
</html>
